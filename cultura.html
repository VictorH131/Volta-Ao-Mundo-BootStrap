  <style>
body {
    background: #0b0b12;
}

/* ===================== DESKTOP ===================== */

.row-interactive {
    display: flex;
    gap: 12px;
}

.card-interactive {
    position: relative;
    flex: 1;
    height: 420px;
    border-radius: 18px;
    overflow: hidden;
    text-decoration: none;
    transition: all 0.5s ease;
    transform: scale(1);
}

.card-interactive img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-interactive span {
    position: absolute;
    bottom: 18px;
    left: 18px;
    color: white;
    font-size: 22px;
    font-weight: bold;
    z-index: 2;
    text-shadow: 0 4px 12px rgba(0,0,0,0.8);
}

.card-interactive::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);
}

.row-interactive:hover .card-interactive {
    filter: blur(3px) brightness(0.5);
    transform: scale(0.95);
}

.card-interactive:hover {
    flex: 2.5;
    filter: blur(0px) brightness(1.15) !important;
    transform: scale(1.05);
    z-index: 10;
}

/* ===================== MOBILE  ===================== */

.mobile-carousel {
    display: none;
}

.mobile-carousel img {
    height: 70vh;
    object-fit: cover;
    border-radius: 18px;
}

.carousel-indicators [data-bs-target] {
    width: 10px;
    height: 4px;
    background-color: white;
    opacity: 0.5;
}

.carousel-indicators .active {
    opacity: 1;
}

@media (max-width: 768px) {
    .row-interactive {
        display: none;
    }

    .mobile-carousel {
        display: block;
    }
}

.carousel-text {
    position: absolute;
    bottom: 55px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 4px 12px rgba(0,0,0,0.8);
    z-index: 10;
    text-align: center;
}
</style>
</head>
