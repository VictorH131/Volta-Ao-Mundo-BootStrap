<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Detalhes - Italia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="shortcut icon" href="img/italia.png" type="image/x-icon">

    <link rel="stylesheet" href="css/italia.css">


</head>

<body class="pagina-detalhes">

    <div class="container py-4 py-md-5">

        <div class="row g-4">

            <!-- CARD GRANDE -->
            <div class="col-lg-8">

                <div class="card shadow-lg border-0 rounded-4 overflow-hidden">

                    <div class="position-relative">

                        <div id="carouselDetalhe" class="carousel slide">
                            <div class="carousel-inner" id="carouselImgs"></div>

                            <button class="carousel-control-prev" data-bs-target="#carouselDetalhe"
                                data-bs-slide="prev">
                                <span class="carousel-control-prev-icon"></span>
                            </button>

                            <button class="carousel-control-next" data-bs-target="#carouselDetalhe"
                                data-bs-slide="next">
                                <span class="carousel-control-next-icon"></span>
                            </button>
                        </div>

                        <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50"></div>

                        <div class="position-absolute bottom-0 start-0 p-4 text-white">
                            <h1 class="fw-bold mb-1" id="titulo"></h1>
                            <small><i class="bi bi-geo-alt"></i> Itália</small>
                        </div>

                    </div>

                    <div class="card-body p-4">

                        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

                            <div class="d-flex gap-2">
                                <span class="badge bg-success fs-6" id="tipo"></span>
                                <span class="badge bg-danger fs-6" id="duracao"></span>
                            </div>

                            <div class="text-warning fw-bold" id="rating"></div>

                        </div>

                        <p class="text-muted fs-6 lh-lg" id="descricao"></p>

                        <hr>

                        <div class="d-flex gap-2 flex-wrap">

                            <button class="btn btn-danger flex-fill" id="btnMapa">
                                <i class="bi bi-geo-alt"></i> Ver no mapa
                            </button>

                            <button class="btn btn-outline-success flex-fill" onclick="window.history.back()">
                                <i class="bi bi-arrow-left"></i> Voltar
                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- COMENTÁRIOS -->
            <div class="col-lg-4">

                <div class="card shadow-sm border-0 rounded-4 p-3">

                    <h5 class="mb-3">Comentários</h5>

                    <div id="listaComentarios"></div>

                    <textarea class="form-control mt-3 mb-2" id="comentario" rows="3"
                        placeholder="Escreva um comentário..."></textarea>


                    <div class="rating mb-2 text-warning">
                        <input type="radio" name="rating" value="5" id="r5"><label for="r5">★</label>
                        <input type="radio" name="rating" value="4" id="r4"><label for="r4">★</label>
                        <input type="radio" name="rating" value="3" id="r3"><label for="r3">★</label>
                        <input type="radio" name="rating" value="2" id="r2"><label for="r2">★</label>
                        <input type="radio" name="rating" value="1" id="r1"><label for="r1">★</label>
                    </div>

                    <button class="btn btn-primary w-100" onclick="addComentario()">
                        Enviar
                    </button>

                </div>

            </div>

        </div>

    </div>

    <footer class="py-3">
        <div class="container text-center">
            <span>© 2026 Victor H. | Projeto Volta ao Mundo - Itália</span>
        </div>
    </footer>


    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/turismo.js"></script>
    <!-- JS Com Incluso Bootstrap -->
    <script src="js/detalhes.js"></script>

</body>

</html>
