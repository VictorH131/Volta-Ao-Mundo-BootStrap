<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Receita - Itália</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="shortcut icon" href="img/italia.png">

    <link rel="stylesheet" href="css/italia.css">
</head>

<body class="pagina-detalhes">

    <main class="container py-5 pagina-receita">

        <div class="row g-4">

            <!-- LADO ESQUERDO -->
            <div class="col-lg-8">

                <div class="box p-4">

                    <h1 id="titulo" class="fw-bold mb-2"></h1>

                    <div id="rating" class="mb-3"></div>

                    <!-- CARROSSEL -->
                    <div id="carouselReceita" class="carousel slide mb-4">
                        <div class="carousel-inner" id="carouselImgs"></div>

                        <button class="carousel-control-prev" data-bs-target="#carouselReceita" data-bs-slide="prev">
                            <span class="carousel-control-prev-icon"></span>
                        </button>

                        <button class="carousel-control-next" data-bs-target="#carouselReceita" data-bs-slide="next">
                            <span class="carousel-control-next-icon"></span>
                        </button>
                    </div>

                    <!-- INFO -->
                    <div class="d-flex gap-3 mb-3 flex-wrap">

                        <span class="badge bg-success fs-6 px-3 py-2" id="tipo"></span>

                        <span class="badge bg-danger fs-6 px-3 py-2" id="duracao"></span>

                    </div>

                    <p id="descricao" class="lead text-muted"></p>

                    <hr>

                    <!-- BOTÃO VOLTAR -->
                    <div class="text-center my-3">
                        <button class="btn btn-outline-primary py-2 w-50" onclick="history.back()">
                            <i class="bi bi-arrow-left"></i> Voltar
                        </button>
                    </div>

                    <hr>

                    <div class="row g-4">

                        <!-- INGREDIENTES -->
                        <div class="col-md-5">
                            <div class="p-3 rounded-4 bg-light h-100">
                                <h5 class="fw-bold mb-3">Ingredientes</h5>
                                <ul id="ingredientes" class="list-group"></ul>
                            </div>
                        </div>

                        <!-- MODO DE PREPARO -->
                        <div class="col-md-7">
                            <div class="p-3 rounded-4 bg-light h-100">
                                <h5 class="fw-bold mb-3">Modo de preparo</h5>
                                <ol id="modoPreparo" class="ps-3 text-muted"></ol>
                            </div>
                        </div>

                    </div>
                </div>

            </div>

            <!-- LADO DIREITO (COMENTÁRIOS) -->
            <div class="col-lg-4">

                <div class="card shadow-sm border-0 rounded-4 p-3">

                    <h5 class="mb-3">Comentários</h5>

                    <div id="listaComentarios"></div>

                    <textarea class="form-control mt-3 mb-2" id="comentario" rows="3"
                        placeholder="Escreva um comentário..."></textarea>

                    <div class="rating mb-2 text-warning">
                        <input type="radio" name="rating" value="5" id="r5"><label for="r5">★</label>
                        <input type="radio" name="rating" value="4" id="r4"><label for="r4">★</label>
                        <input type="radio" name="rating" value="3" id="r3"><label for="r3">★</label>
                        <input type="radio" name="rating" value="2" id="r2"><label for="r2">★</label>
                        <input type="radio" name="rating" value="1" id="r1"><label for="r1">★</label>
                    </div>

                    <button class="btn btn-primary w-100" onclick="addComentario()">
                        Enviar
                    </button>

                </div>

            </div>

        </div>

    </main>

    <footer class="py-3">
        <div class="container text-center">
            <span>© 2026 Projeto Itália</span>
        </div>
    </footer>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JS Com Incluso Bootstrap -->
    <script src="js/receitas.js"></script>

</body>

</html>
